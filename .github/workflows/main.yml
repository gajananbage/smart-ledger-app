name: Build Flet APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    # १. कोड चेकआउट करणे
    - name: Checkout Code
      uses: actions/checkout@v4

    # २. पायथन सेट करणे
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ३. ग्रेडर एरर फिक्स करण्यासाठी Java 17 सेट करणे (अत्यंत महत्त्वाचे)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ४. सिस्टीम डिपेंडन्सीज इन्स्टॉल करणे
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    # ५. अधिकृत अँड्रॉइड SDK सेट करणे
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ६. SDK टूल्स आणि AIDL चा पाथ लॉक करणे
    - name: Install Android Build-Tools & Fix AIDL
      run: |
        yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
        echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
        sudo ln -sf ${ANDROID_SDK_ROOT}/build-tools/34.0.0/aidl /usr/bin/aidl

    # ७. Buildozer वापरून APK तयार करणे
    - name: Build with Buildozer
      run: |
        buildozer -v android debug

    # ८. तयार झालेली APK फाईल अपलोड करणे
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: bin/*.apk
