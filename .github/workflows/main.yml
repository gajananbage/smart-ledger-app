name: Build Flet APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Pre-configure Android SDK & AIDL
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        # अधिकृत ३३.०.२ बिल्ड-टूल्स इन्स्टॉल करत आहोत ज्यामध्ये AIDL स्थिर चालते
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "build-tools;33.0.2" "platforms;android-33" "platform-tools"
        
        # कंपायल करताना सिस्टीमला पाथ कळावा म्हणून सिमलिंक (Symlink) तयार करत आहोत
        sudo ln -sf $ANDROID_HOME/build-tools/33.0.2/aidl /usr/bin/aidl
        
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

    - name: Build with Buildozer
      run: |
        # Buildozer ला सांगणे की सिस्टीमचे आधीपासून असलेले SDK वापरावे
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flet-app-apk
        path: bin/*.apk
        
